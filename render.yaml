# Render Blueprint — Backend + PostgreSQL + Redis
services:
  - type: web
    name: tienlen-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tienlen-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: tienlen-redis
          type: redis
          property: connectionString

databases:
  - name: tienlen-db
    plan: free

  - name: tienlen-redis
    plan: free
    type: redis
