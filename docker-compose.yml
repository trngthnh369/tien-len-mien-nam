services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tienlen
      POSTGRES_USER: tienlen
      POSTGRES_PASSWORD: tienlen_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/database/migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
